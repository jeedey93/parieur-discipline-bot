title: "Parieur Discipliné"
description: "AI-Powered NHL & NBA Betting Predictions"
date: "March 3, 2026"  # Added today's date for top banner
theme: jekyll-theme-cayman
show_downloads: false
logo: "parieur_discipline.png"

# SEO & metadata
url: "https://jeedey93.github.io"
baseurl: "/parieur-discipline-bot"

# Exclude unnecessary files from build
exclude:
  - __pycache__
  - "*.py"
  - "*.pyc"
  - .env
  - .gitignore
  - requirements.txt
  - bot_results
  - predictions
  - prompts
  - data
  - images
  - .github

# Plugins
plugins:
  - jekyll-seo-tag
