<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=630">
    <title>OG Image</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,%3Csvg width="60" height="60" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M0 0h60v60H0z" fill="none"/%3E%3Cpath d="M30 0l30 30-30 30L0 30z" fill="%23ffffff" fill-opacity=".03"/%3E%3C/svg%3E');
            opacity: 0.3;
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .logo {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .title {
            font-size: 64px;
            font-weight: 800;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 36px;
            font-weight: 300;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="parieur_discipline.png" alt="Parieur Discipliné" class="logo">
        <div class="title">🎯 Parieur Discipliné</div>
        <div class="subtitle">AI-Powered NHL & NBA Betting Predictions</div>
    </div>
</body>
</html>
