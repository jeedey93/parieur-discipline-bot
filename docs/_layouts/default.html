<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="icon" type="image/png" href="{{ site.logo | relative_url }}">
    <title>{{ site.title }} - {{ site.date }}</title>
    <style>
      .page-header {
        text-align: center;
      }
      .page-header .project-logo {
        width: 150px;
        border-radius: 50%;
        margin-bottom: 15px;
        border: 3px solid rgba(255,255,255,0.3);
      }
      .page-header h1 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <header class="page-header" role="banner">
      {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" class="project-logo">
      {% endif %}
      <h1 class="project-name">🎯 {{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <span class="site-footer-credits">Powered by AI · Discipline > Emotion 🎯</span>
      </footer>
    </main>
  </body>
</html>
