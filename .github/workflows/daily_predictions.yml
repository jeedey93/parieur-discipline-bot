name: Daily NHL/NBA Dual Predictions

on:
  schedule:
    # 7:00AM Montreal (12:00 UTC standard, 11:00 UTC daylight saving)
    - cron: '0 12 * * *'
    # 12:00PM Montreal (17:00 UTC standard, 16:00 UTC daylight saving)
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  run-dual-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Set environment variables
        run: |
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" > .env
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env
      - name: Determine run time
        id: run_time
        run: |
          # Determine if this is 7am or 12pm run based on current UTC time
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "12" ]; then
            echo "time=7am" >> $GITHUB_OUTPUT
          else
            echo "time=12pm" >> $GITHUB_OUTPUT
          fi
      - name: Run NHL daily predictions bot
        if: steps.run_time.outputs.time == '7am' || steps.run_time.outputs.time == '12pm'
        run: python scripts/generate_nhl_predictions.py
      - name: Run NBA daily predictions bot
        if: steps.run_time.outputs.time == '7am' || steps.run_time.outputs.time == '12pm'
        run: python scripts/generate_nba_predictions.py
      - name: Update website with results only (7am)
        if: steps.run_time.outputs.time == '7am'
        run: python scripts/generate_website.py --results-only
      - name: Compare NBA predictions (12pm)
        if: steps.run_time.outputs.time == '12pm'
        run: python scripts/compare_nba_predictions.py
      - name: Compare NHL predictions (12pm)
        if: steps.run_time.outputs.time == '12pm'
        run: python scripts/compare_nhl_predictions.py
      - name: Update website with predictions (12pm)
        if: steps.run_time.outputs.time == '12pm'
        run: python scripts/generate_website.py
      - name: Run Dual Bet of the Day (12pm)
        if: steps.run_time.outputs.time == '12pm'
        run: python scripts/generate_featured_picks.py --run_time 12pm
      - name: Commit predictions
        if: steps.run_time.outputs.time == '7am' || steps.run_time.outputs.time == '12pm'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            if [ "${{ steps.run_time.outputs.time }}" = "7am" ]; then
              git commit -m "Update website with results for $(date -u +%Y-%m-%d)"
            else
              git commit -m "Add final predictions for $(date -u +%Y-%m-%d)"
            fi
            git push --set-upstream https://$GH_PAT@github.com/${{ github.repository }} HEAD:master
          else
            echo "No changes to commit"
          fi
          echo "Predictions workflow completed"
      - name: Prepare email body
        id: prepare_email
        run: |
          # Extract picks from dual bet of the day file
          DUAL_BET_FILE="predictions/dual_bet_of_the_day.txt"

          NHL_PICK="Check website for today's pick"
          NBA_PICK="Check website for today's pick"

          if [ -f "$DUAL_BET_FILE" ]; then
            # Extract NHL pick (PICK #1)
            NHL_LINE=$(grep "PICK #1.*NHL" "$DUAL_BET_FILE" || echo "")
            if [ -n "$NHL_LINE" ]; then
              # Extract full pick text with odds
              NHL_PICK=$(echo "$NHL_LINE" | sed 's/.*🏒//' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
            fi

            # Extract NBA pick (PICK #2)
            NBA_LINE=$(grep "PICK #2.*NBA" "$DUAL_BET_FILE" || echo "")
            if [ -n "$NBA_LINE" ]; then
              # Extract full pick text with odds
              NBA_PICK=$(echo "$NBA_LINE" | sed 's/.*🏀//' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
            fi
          fi

          # Extract yesterday's results
          YESTERDAY=$(TZ='America/Toronto' date -d 'yesterday' +"%Y-%m-%d" 2>/dev/null || TZ='America/Toronto' date -v-1d +"%Y-%m-%d")
          RESULTS_FILE="bot_results/total_results_summary.txt"
          NHL_RESULTS_FILE="bot_results/nhl/nhl_daily_results_${YESTERDAY}.txt"
          NBA_RESULTS_FILE="bot_results/nba/nba_daily_results_${YESTERDAY}.txt"
          YESTERDAY_BANNER="NEW PREDICTIONS AVAILABLE - DAILY UPDATE"

          if [ -f "$RESULTS_FILE" ]; then
            # Extract NBA yesterday's record
            NBA_YESTERDAY=$(grep "^$YESTERDAY:" "$RESULTS_FILE" | head -1 || echo "")
            # Extract NHL yesterday's record (second occurrence of the date)
            NHL_YESTERDAY=$(grep "^$YESTERDAY:" "$RESULTS_FILE" | tail -1 || echo "")

            if [ -n "$NBA_YESTERDAY" ] || [ -n "$NHL_YESTERDAY" ]; then
              TOTAL_WINS=0
              TOTAL_LOSSES=0
              TOTAL_UNITS=0

              # Calculate NHL units
              if [ -f "$NHL_RESULTS_FILE" ]; then
                while IFS= read -r line; do
                  if echo "$line" | grep -q "Units:"; then
                    UNITS=$(echo "$line" | sed 's/.*Units: \([0-9.]*\)u.*/\1/')
                    if echo "$line" | grep -q "Outcome: \*\*WIN\*\*"; then
                      ODDS=$(echo "$line" | sed 's/.*@ \([0-9.]*\).*/\1/')
                      PROFIT=$(echo "scale=2; $UNITS * ($ODDS - 1)" | bc)
                      TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS + $PROFIT" | bc)
                    elif echo "$line" | grep -q "Outcome: \*\*LOSS\*\*"; then
                      TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS - $UNITS" | bc)
                    fi
                  fi
                done < "$NHL_RESULTS_FILE"
              fi

              # Calculate NBA units
              if [ -f "$NBA_RESULTS_FILE" ]; then
                while IFS= read -r line; do
                  if echo "$line" | grep -q "Units:"; then
                    UNITS=$(echo "$line" | sed 's/.*Units: \([0-9.]*\)u.*/\1/')
                    if echo "$line" | grep -q "Outcome: \*\*WIN\*\*"; then
                      ODDS=$(echo "$line" | sed 's/.*@ \([0-9.]*\).*/\1/')
                      PROFIT=$(echo "scale=2; $UNITS * ($ODDS - 1)" | bc)
                      TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS + $PROFIT" | bc)
                    elif echo "$line" | grep -q "Outcome: \*\*LOSS\*\*"; then
                      TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS - $UNITS" | bc)
                    fi
                  fi
                done < "$NBA_RESULTS_FILE"
              fi

              if [ -n "$NBA_YESTERDAY" ]; then
                NBA_WINS=$(echo "$NBA_YESTERDAY" | sed 's/.*: \([0-9]*\) win.*/\1/')
                NBA_LOSSES=$(echo "$NBA_YESTERDAY" | sed 's/.* \([0-9]*\) loss.*/\1/')
                TOTAL_WINS=$((TOTAL_WINS + NBA_WINS))
                TOTAL_LOSSES=$((TOTAL_LOSSES + NBA_LOSSES))
              fi

              if [ -n "$NHL_YESTERDAY" ]; then
                NHL_WINS=$(echo "$NHL_YESTERDAY" | sed 's/.*: \([0-9]*\) win.*/\1/')
                NHL_LOSSES=$(echo "$NHL_YESTERDAY" | sed 's/.* \([0-9]*\) loss.*/\1/')
                TOTAL_WINS=$((TOTAL_WINS + NHL_WINS))
                TOTAL_LOSSES=$((TOTAL_LOSSES + NHL_LOSSES))
              fi

              # Format units with + or - sign
              if [ $(echo "$TOTAL_UNITS >= 0" | bc) -eq 1 ]; then
                UNITS_TEXT="+${TOTAL_UNITS}u"
              else
                UNITS_TEXT="${TOTAL_UNITS}u"
              fi

              YESTERDAY_BANNER="YESTERDAY: ${TOTAL_WINS}W - ${TOTAL_LOSSES}L (${UNITS_TEXT})"
            fi
          fi

          # Replace placeholders in email template
          sed -e "s|\${NHL_PICK}|$NHL_PICK|g" \
              -e "s|\${NBA_PICK}|$NBA_PICK|g" \
              -e "s|NEW PREDICTIONS AVAILABLE - DAILY UPDATE|$YESTERDAY_BANNER|g" \
              .github/workflows/email_body.html > /tmp/email_body.html

          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/email_body.html >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Generate email subject with day and date in Montreal timezone
          EMAIL_DATE=$(TZ='America/Toronto' date +"%A, %B %d, %Y")
          echo "subject=$EMAIL_DATE - NHL/NBA Daily Picks" >> $GITHUB_OUTPUT
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ${{ steps.prepare_email.outputs.subject }}
          html_body: ${{ steps.prepare_email.outputs.body }}
          to: ${{ secrets.EMAIL_TO }}
          from: Parieur Discipliné
