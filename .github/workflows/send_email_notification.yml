name: Send Email Notification

on:
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Prepare email body
        id: prepare_email
        run: |
          # Extract picks from dual bet of the day file
          DUAL_BET_FILE="data/predictions/dual_bet_of_the_day.txt"

          NHL_PICK="Check website for today's pick"
          NBA_PICK="Check website for today's pick"

          if [ -f "$DUAL_BET_FILE" ]; then
            # Extract NHL pick (PICK #1)
            NHL_LINE=$(grep "PICK #1.*NHL" "$DUAL_BET_FILE" || echo "")
            if [ -n "$NHL_LINE" ]; then
              # Extract pick text without odds
              PICK_WITHOUT_ODDS=$(echo "$NHL_LINE" | sed 's/.*🏒//' | sed 's/@.*$//' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
              # Extract odds
              ODDS=$(echo "$NHL_LINE" | sed 's/.*@ \([0-9.]*\).*/\1/')
              NHL_PICK="${PICK_WITHOUT_ODDS}<br/><span style='font-size: 14px; color: #93c5fd;'>@${ODDS}</span>"
            fi

            # Extract NBA pick (PICK #2)
            NBA_LINE=$(grep "PICK #2.*NBA" "$DUAL_BET_FILE" || echo "")
            if [ -n "$NBA_LINE" ]; then
              # Extract pick text without odds
              PICK_WITHOUT_ODDS=$(echo "$NBA_LINE" | sed 's/.*🏀//' | sed 's/@.*$//' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
              # Extract odds
              ODDS=$(echo "$NBA_LINE" | sed 's/.*@ \([0-9.]*\).*/\1/')
              NBA_PICK="${PICK_WITHOUT_ODDS}<br/><span style='font-size: 14px; color: #fed7aa;'>@${ODDS}</span>"
            fi
          fi

          # Extract yesterday's results
          # Note: Results for yesterday's games are in today's result files
          TODAY=$(TZ='America/Toronto' date +"%Y-%m-%d")
          YESTERDAY=$(TZ='America/Toronto' date -d 'yesterday' +"%Y-%m-%d" 2>/dev/null || TZ='America/Toronto' date -v-1d +"%Y-%m-%d")
          RESULTS_FILE="data/bot_results/total_results_summary.txt"
          NHL_RESULTS_FILE="data/bot_results/nhl/nhl_daily_results_${TODAY}.txt"
          NBA_RESULTS_FILE="data/bot_results/nba/nba_daily_results_${TODAY}.txt"
          YESTERDAY_BANNER="NEW PREDICTIONS AVAILABLE - DAILY UPDATE"

          if [ -f "$RESULTS_FILE" ]; then
            # Extract NBA yesterday's record
            NBA_YESTERDAY=$(grep "^$YESTERDAY:" "$RESULTS_FILE" | head -1 || echo "")
            # Extract NHL yesterday's record (second occurrence of the date)
            NHL_YESTERDAY=$(grep "^$YESTERDAY:" "$RESULTS_FILE" | tail -1 || echo "")

            if [ -n "$NBA_YESTERDAY" ] || [ -n "$NHL_YESTERDAY" ]; then
              TOTAL_WINS=0
              TOTAL_LOSSES=0
              TOTAL_UNITS=0

              # Calculate NHL units
              if [ -f "$NHL_RESULTS_FILE" ]; then
                CURRENT_UNITS=""
                CURRENT_ODDS=""
                while IFS= read -r line; do
                  # Extract units and odds from bet line
                  if echo "$line" | grep -q "@ [0-9.]* - .*Units: [0-9.]*u"; then
                    CURRENT_ODDS=$(echo "$line" | sed 's/.*@ \([0-9.]*\) -.*/\1/')
                    CURRENT_UNITS=$(echo "$line" | sed 's/.*Units: \([0-9.]*\)u.*/\1/')
                  fi
                  # Check outcome and calculate
                  if echo "$line" | grep -q "Outcome: \*\*WIN\*\*" && [ -n "$CURRENT_UNITS" ] && [ -n "$CURRENT_ODDS" ]; then
                    PROFIT=$(echo "scale=2; $CURRENT_UNITS * ($CURRENT_ODDS - 1)" | bc)
                    TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS + $PROFIT" | bc)
                    CURRENT_UNITS=""
                    CURRENT_ODDS=""
                  elif echo "$line" | grep -q "Outcome: \*\*LOSS\*\*" && [ -n "$CURRENT_UNITS" ]; then
                    TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS - $CURRENT_UNITS" | bc)
                    CURRENT_UNITS=""
                    CURRENT_ODDS=""
                  elif echo "$line" | grep -q "Outcome: \*\*PUSH\*\*"; then
                    CURRENT_UNITS=""
                    CURRENT_ODDS=""
                  fi
                done < "$NHL_RESULTS_FILE"
              fi

              # Calculate NBA units
              if [ -f "$NBA_RESULTS_FILE" ]; then
                CURRENT_UNITS=""
                CURRENT_ODDS=""
                while IFS= read -r line; do
                  # Extract units and odds from bet line
                  if echo "$line" | grep -q "@ [0-9.]* - .*Units: [0-9.]*u"; then
                    CURRENT_ODDS=$(echo "$line" | sed 's/.*@ \([0-9.]*\) -.*/\1/')
                    CURRENT_UNITS=$(echo "$line" | sed 's/.*Units: \([0-9.]*\)u.*/\1/')
                  fi
                  # Check outcome and calculate
                  if echo "$line" | grep -q "Outcome: \*\*WIN\*\*" && [ -n "$CURRENT_UNITS" ] && [ -n "$CURRENT_ODDS" ]; then
                    PROFIT=$(echo "scale=2; $CURRENT_UNITS * ($CURRENT_ODDS - 1)" | bc)
                    TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS + $PROFIT" | bc)
                    CURRENT_UNITS=""
                    CURRENT_ODDS=""
                  elif echo "$line" | grep -q "Outcome: \*\*LOSS\*\*" && [ -n "$CURRENT_UNITS" ]; then
                    TOTAL_UNITS=$(echo "scale=2; $TOTAL_UNITS - $CURRENT_UNITS" | bc)
                    CURRENT_UNITS=""
                    CURRENT_ODDS=""
                  elif echo "$line" | grep -q "Outcome: \*\*PUSH\*\*"; then
                    CURRENT_UNITS=""
                    CURRENT_ODDS=""
                  fi
                done < "$NBA_RESULTS_FILE"
              fi

              if [ -n "$NBA_YESTERDAY" ]; then
                NBA_WINS=$(echo "$NBA_YESTERDAY" | sed 's/.*: \([0-9]*\) win.*/\1/')
                NBA_LOSSES=$(echo "$NBA_YESTERDAY" | sed 's/.* \([0-9]*\) loss.*/\1/')
                TOTAL_WINS=$((TOTAL_WINS + NBA_WINS))
                TOTAL_LOSSES=$((TOTAL_LOSSES + NBA_LOSSES))
              fi

              if [ -n "$NHL_YESTERDAY" ]; then
                NHL_WINS=$(echo "$NHL_YESTERDAY" | sed 's/.*: \([0-9]*\) win.*/\1/')
                NHL_LOSSES=$(echo "$NHL_YESTERDAY" | sed 's/.* \([0-9]*\) loss.*/\1/')
                TOTAL_WINS=$((TOTAL_WINS + NHL_WINS))
                TOTAL_LOSSES=$((TOTAL_LOSSES + NHL_LOSSES))
              fi

              # Format units with + or - sign and 2 decimals
              TOTAL_UNITS=$(printf "%.2f" $TOTAL_UNITS)
              if [ $(echo "$TOTAL_UNITS > 0" | bc) -eq 1 ]; then
                UNITS_TEXT="<span style='color: #10b981;'>+${TOTAL_UNITS}u</span>"
              elif [ $(echo "$TOTAL_UNITS < 0" | bc) -eq 1 ]; then
                UNITS_TEXT="<span style='color: #ef4444;'>${TOTAL_UNITS}u</span>"
              else
                UNITS_TEXT="+${TOTAL_UNITS}u"
              fi

              YESTERDAY_BANNER="YESTERDAY: ${TOTAL_WINS}W - ${TOTAL_LOSSES}L (${UNITS_TEXT})"
            fi
          fi

          # Replace placeholders in email template
          sed -e "s|\${NHL_PICK}|$NHL_PICK|g" \
              -e "s|\${NBA_PICK}|$NBA_PICK|g" \
              -e "s|NEW PREDICTIONS AVAILABLE - DAILY UPDATE|$YESTERDAY_BANNER|g" \
              .github/workflows/email_body.html > /tmp/email_body.html

          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/email_body.html >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Generate email subject with day and date in Montreal timezone
          EMAIL_DATE=$(TZ='America/Toronto' date +"%A, %B %d, %Y")
          echo "subject=$EMAIL_DATE - NHL/NBA Daily Picks" >> $GITHUB_OUTPUT
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ${{ steps.prepare_email.outputs.subject }}
          html_body: ${{ steps.prepare_email.outputs.body }}
          to: ${{ secrets.EMAIL_TO }}
          from: Parieur Discipliné

