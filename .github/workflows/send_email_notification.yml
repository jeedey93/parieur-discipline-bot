name: Send Email Notification

on:
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Prepare email body
        id: prepare_email
        run: |
          # Read email body directly - no replacement needed
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat .github/workflows/email_body.html >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Generate email subject with date in Montreal timezone
          EMAIL_DATE=$(TZ='America/Toronto' date +"%B %d, %Y")
          echo "subject=$EMAIL_DATE - NHL/NBA Daily Picks" >> $GITHUB_OUTPUT
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ${{ steps.prepare_email.outputs.subject }}
          html_body: ${{ steps.prepare_email.outputs.body }}
          to: ${{ secrets.EMAIL_TO }}
          from: Parieur Discipliné Bot

