name: Send Email Notification

on:
  workflow_dispatch:
    inputs:
      run_time:
        description: 'Run time (7am or 12pm)'
        required: false
        default: '12pm'
        type: choice
        options:
          - 7am
          - 12pm

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Prepare email body
        id: prepare_email
        run: |
          # Use input or default to 12pm
          RUN_TIME="${{ github.event.inputs.run_time || '12pm' }}"
          sed "s/\${RUN_TIME}/$RUN_TIME/g" .github/workflows/email_body.html > /tmp/email_body.html
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/email_body.html >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Generate email subject with date
          EMAIL_DATE=$(date +"%B %d, %Y")
          echo "subject=$EMAIL_DATE - NHL/NBA Daily Picks" >> $GITHUB_OUTPUT
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ${{ steps.prepare_email.outputs.subject }}
          html_body: ${{ steps.prepare_email.outputs.body }}
          to: ${{ secrets.EMAIL_TO }}
          from: Parieur Discipliné Bot

